{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center p-6 relative">
    <div class="relative z-10">
        <div class="mb-12">
            <i class="fas fa-bolt text-portfolio-orange text-8xl animate-pulse drop-shadow-[0_0_30px_rgba(249,115,22,0.6)]"></i>
        </div>

        <h1 class="portfolio-heading text-4xl md:text-7xl text-white mb-4 tracking-tighter">CONNECTION TURBULENCE</h1>
        <p class="text-portfolio-orange uppercase font-bold tracking-[0.3em] text-xs mb-8">Error 500: Server Hiccup</p>
        
        <div class="max-w-md mx-auto mb-10 p-6 border border-white/5 bg-white/5 rounded">
            <p class="text-gray-400 text-sm italic">
                "Hmph. The chakra flow in this section is currently unstable. I'm working to stabilize the link, human. 
                Patience is a shinobi's greatest virtue."
            </p>
        </div>

        <div class="flex flex-col md:flex-row gap-4 justify-center">
            <button onclick="window.location.reload()" class="btn-portfolio-secondary">
                <i class="fas fa-sync mr-2"></i> STABILIZE LINK
            </button>
            <a href="{% url 'home' %}" class="btn-portfolio-primary">
                BACK TO DOMAIN
            </a>
        </div>
    </div>
</div>
{% endblock %}
